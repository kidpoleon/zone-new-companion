name: Build Windows executable

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller Pillow

      - name: Generate Windows ICO
        run: |
          python scripts/generate_windows_ico.py

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed --name "zone-new-companion" `
            --icon "zone_new_companion/icon/app.ico" `
            main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zone-new-companion-windows
          path: dist/zone-new-companion.exe

