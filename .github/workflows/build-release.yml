name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 1.2.1)'
        required: true
        default: '1.2.1'

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      release_id: ${{ steps.create_release.outputs.id }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          else
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "VERSION=$VERSION" >> $GITHUB_ENV
          fi
          echo "Building version: $VERSION"

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: v${{ env.VERSION }}
          body: |
            ## Zone New Companion v${{ env.VERSION }}

            ### Downloads
            - **Windows**: zone-new-companion.exe
            - **Linux**: zone-new-companion.AppImage
            - **macOS**: Zone-New-Companion.dmg

            ### Installation
            1. Download the appropriate file for your platform
            2. Windows: Double-click the .exe file
            3. Linux: Make the AppImage executable with `chmod +x` then run
            4. macOS: Open the .dmg and drag to Applications

            ### Requirements
            - VLC media player must be installed separately
            - For OCR features: Tesseract OCR and FFmpeg (see BUILD.md)

            See [BUILD.md](https://github.com/kidpoleon/zone-new-companion/blob/main/BUILD.md) for detailed build instructions.
          draft: false
          prerelease: false

  build-windows:
    name: Build Windows Executable
    needs: create-release
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build executable
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed `
            --name zone-new-companion `
            --icon zone_new_companion\icon\icon.ico `
            --add-data "zone_new_companion\icon\icon.ico;zone_new_companion/icon" `
            --add-data "media;media" `
            --hidden-import pytesseract `
            --hidden-import cv2 `
            --hidden-import numpy `
            --hidden-import PIL `
            --collect-all pytesseract `
            --collect-all cv2 `
            --exclude-module matplotlib `
            --exclude-module scipy `
            main.py

      - name: Upload to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./dist/zone-new-companion.exe
          asset_name: zone-new-companion.exe
          asset_content_type: application/vnd.microsoft.portable-executable

  build-linux:
    name: Build Linux AppImage
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-dev build-essential

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build executable
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed \
            --name zone-new-companion \
            --icon zone_new_companion/icon/icon.ico \
            --add-data "zone_new_companion/icon/icon.ico:zone_new_companion/icon" \
            --add-data "media:media" \
            --hidden-import pytesseract \
            --hidden-import cv2 \
            --hidden-import numpy \
            --hidden-import PIL \
            --collect-all pytesseract \
            --collect-all cv2 \
            --exclude-module matplotlib \
            --exclude-module scipy \
            main.py

      - name: Create AppImage
        run: |
          # Download appimagetool
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          
          # Create AppDir structure
          mkdir -p AppDir/usr/bin
          cp dist/zone-new-companion AppDir/usr/bin/
          
          # Create desktop file
          cat > AppDir/zone-new-companion.desktop << 'EOF'
          [Desktop Entry]
          Name=Zone New Companion
          Exec=zone-new-companion
          Icon=icon
          Type=Application
          Categories=AudioVideo;Video;
          Comment=Unified desktop IPTV companion app
          EOF
          
          # Copy icon
          cp media/logo.png AppDir/icon.png
          
          # Build AppImage
          ./appimagetool-x86_64.AppImage AppDir zone-new-companion.AppImage

      - name: Upload to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./zone-new-companion.AppImage
          asset_name: zone-new-companion.AppImage
          asset_content_type: application/x-executable

  build-macos:
    name: Build macOS DMG
    needs: create-release
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt
          
          # Install create-dmg
          brew install create-dmg

      - name: Build .app bundle
        run: |
          pyinstaller --noconfirm --clean --windowed \
            --name "Zone New Companion" \
            --icon zone_new_companion/icon/icon.icns \
            --add-data "zone_new_companion/icon/icon.icns:zone_new_companion/icon" \
            --add-data "media:media" \
            --hidden-import pytesseract \
            --hidden-import cv2 \
            --hidden-import numpy \
            --hidden-import PIL \
            --collect-all pytesseract \
            --collect-all cv2 \
            --exclude-module matplotlib \
            --exclude-module scipy \
            main.py

      - name: Create ICNS icon (if not exists)
        run: |
          if [ ! -f "zone_new_companion/icon/icon.icns" ]; then
            mkdir -p icon.iconset
            sips -z 16 16 media/logo.png --out icon.iconset/icon_16x16.png
            sips -z 32 32 media/logo.png --out icon.iconset/icon_16x16@2x.png
            sips -z 32 32 media/logo.png --out icon.iconset/icon_32x32.png
            sips -z 64 64 media/logo.png --out icon.iconset/icon_32x32@2x.png
            sips -z 128 128 media/logo.png --out icon.iconset/icon_128x128.png
            sips -z 256 256 media/logo.png --out icon.iconset/icon_128x128@2x.png
            sips -z 256 256 media/logo.png --out icon.iconset/icon_256x256.png
            sips -z 512 512 media/logo.png --out icon.iconset/icon_256x256@2x.png
            iconutil -c icns icon.iconset -o zone_new_companion/icon/icon.icns
            rm -rf icon.iconset
          fi

      - name: Create DMG
        run: |
          create-dmg \
            --volname "Zone New Companion Installer" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "Zone New Companion.app" 200 190 \
            --hide-extension "Zone New Companion.app" \
            --app-drop-link 600 185 \
            "Zone-New-Companion.dmg" \
            "dist/Zone New Companion.app"

      - name: Upload to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./Zone-New-Companion.dmg
          asset_name: Zone-New-Companion.dmg
          asset_content_type: application/x-apple-diskimage
