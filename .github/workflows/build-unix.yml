name: Build Linux/macOS executables

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Build with PyInstaller (Linux)
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed --name "zone-new-companion" main.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zone-new-companion-linux
          path: dist/zone-new-companion

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Build with PyInstaller (macOS)
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed --name "zone-new-companion" main.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zone-new-companion-macos
          path: dist/zone-new-companion

