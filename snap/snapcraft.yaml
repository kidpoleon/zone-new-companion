name: zone-new-companion
version: '1.1.11'
summary: Unified desktop IPTV companion app
description: |
  Zone New Companion is a unified desktop IPTV companion app for
  Xtream Codes, Stalker Portal, and M3U playlists.
  
  Features:
  - Connect to Xtream Codes, Stalker Portal, or M3U playlists
  - Modern PyQt6 interface with dark theme support
  - Seamless streaming through VLC media player
  - Electronic Program Guide for live TV
  - Browse and play TV series with season/episode navigation
  - Quick reconnect to previous portals
  - Built-in stream verification tools

grade: stable
confinement: strict
base: core22

architectures:
  - build-on: amd64
  - build-on: arm64

parts:
  zone-new-companion:
    plugin: python
    source: .
    python-packages:
      - PyQt6==6.7.0
      - qdarkstyle==3.2.3
      - requests==2.32.0
      - pydantic==2.7.0
      - pillow==10.3.0
      - pytesseract==0.3.10
    build-packages:
      - libgl1-mesa-dev
      - libxkbcommon-x11-dev
      - libxcb-xinerama0
      - libxcb-icccm4
      - libxcb-image0
      - libxcb-keysyms1
      - libxcb-randr0
      - libxcb-render-util0
      - libxcb-xfixes0
      - libegl1
      - libxkbcommon0
      - libglu1-mesa
      - libopengl0
      - libfontconfig1
      - libxcb-shape0
    stage-packages:
      - libgl1
      - libglx0
      - libxkbcommon0
      - libxkbcommon-x11-0
      - libxcb-xinerama0
      - libxcb-icccm4
      - libxcb-image0
      - libxcb-keysyms1
      - libxcb-randr0
      - libxcb-render-util0
      - libxcb-xfixes0
      - libegl1
      - libfontconfig1
      - libxcb-shape0
      - libtesseract4
      - libtesseract-dev
      - tesseract-ocr
      - tesseract-ocr-eng

apps:
  zone-new-companion:
    command: bin/zone-new-companion
    desktop: usr/share/applications/zone-new-companion.desktop
    plugs:
      - x11
      - wayland
      - desktop
      - desktop-legacy
      - network
      - network-bind
      - home
      - removable-media
      - opengl
    environment:
      QT_QPA_PLATFORM: xcb
      QT_QPA_PLATFORMTHEME: gtk2

slots:
  zone-new-companion-vlc:
    interface: content
    content: vlc
    read:
      - /
